<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync Pinned Tabs</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      min-width: 280px;
      padding: 12px 16px;
      margin: 0;
      background: #f9f9fb;
      color: #1c1b22;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 12px;
    }
    #status {
      font-size: 12px;
      color: #5b5b66;
      margin-bottom: 12px;
      min-height: 16px;
    }
    #profile-id {
      font-size: 11px;
      color: #8080a0;
      word-break: break-all;
      margin-bottom: 12px;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      background: #0060df;
      color: #fff;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #0250bb;
    }
    button:disabled {
      background: #b8b8cc;
      cursor: default;
    }
    .settings-link {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: #8080a0;
      text-align: right;
      cursor: pointer;
      text-decoration: underline;
    }
    .settings-link:hover {
      color: #0060df;
    }
  </style>
</head>
<body>
  <h1>Sync Pinned Tabs</h1>
  <p id="profile-id">Loading…</p>
  <p id="status"></p>
  <button id="sync-btn">Sync Now</button>
  <a class="settings-link" id="settings-link">Settings</a>
  <script src="popup.js"></script>
</body>
</html>
